name: Pipewright

on:
  pull_request:
    branches: [main]

jobs:
  pipewright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipewright
        run: pip install pipewright[openai]

      - name: Run code-review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pipewright run code-review . -p openrouter -y
